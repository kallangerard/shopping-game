name: CI

on:
  push:
    paths-ignore:
      - manifests/**
      - *.md

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v31

      - name: Run Django tests
        run: nix develop --command sh -c "uv sync --frozen --no-dev && uv run python manage.py test --verbosity=2"
        env:
          DJANGO_SETTINGS_MODULE: shopping_game.settings
