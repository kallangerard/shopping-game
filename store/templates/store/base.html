<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>{% block title %}Supermarket Checkout{% endblock %}</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green: #2e7d32;
      --green-light: #43a047;
      --red: #c62828;
      --red-light: #e53935;
      --blue: #1565c0;
      --yellow: #f9a825;
      --bg: #f5f5f5;
      --card-bg: #ffffff;
      --text: #212121;
      --muted: #757575;
      --radius: 16px;
      --shadow: 0 4px 12px rgba(0,0,0,0.12);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    header {
      background: var(--green);
      color: white;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: var(--shadow);
    }

    header h1 { font-size: 1.6rem; font-weight: 700; }
    header nav a {
      color: white;
      text-decoration: none;
      font-size: 1rem;
      padding: 8px 16px;
      border-radius: 8px;
      background: rgba(255,255,255,0.2);
    }
    header nav a:hover { background: rgba(255,255,255,0.35); }

    main { padding: 24px; max-width: 1400px; margin: 0 auto; }

    .btn {
      display: inline-block;
      padding: 14px 28px;
      border-radius: var(--radius);
      border: none;
      font-size: 1.1rem;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      text-align: center;
      transition: opacity 0.15s, transform 0.1s;
      user-select: none;
    }
    .btn:active { transform: scale(0.97); }
    .btn-green  { background: var(--green);  color: white; }
    .btn-green:hover  { background: var(--green-light); }
    .btn-red    { background: var(--red);    color: white; }
    .btn-red:hover    { background: var(--red-light); }
    .btn-blue   { background: var(--blue);   color: white; }
    .btn-yellow { background: var(--yellow); color: #212121; }
    .btn-outline {
      background: transparent;
      border: 2px solid var(--muted);
      color: var(--text);
    }
    .btn-lg { padding: 18px 36px; font-size: 1.3rem; }
    .btn-sm { padding: 8px 16px; font-size: 0.9rem; }

    .card {
      background: var(--card-bg);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 24px;
    }

    .alert {
      padding: 16px 20px;
      border-radius: var(--radius);
      margin-bottom: 20px;
      font-weight: 600;
    }
    .alert-error { background: #ffebee; color: var(--red); border-left: 4px solid var(--red); }

    {% block extra_style %}{% endblock %}
  </style>
</head>
<body>
  <header>
    <h1>🛒 Supermarket Checkout</h1>
    <nav>
      <a href="{% url 'pos' %}">🏪 Shop</a>
    </nav>
  </header>
  <main>
    {% block content %}{% endblock %}
  </main>
  {% block extra_script %}{% endblock %}
</body>
</html>
