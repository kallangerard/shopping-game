apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: shopping-game-ingress
spec:
  podSelector:
    matchLabels:
      app: shopping-game
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
          podSelector:
            matchLabels:
              app.kubernetes.io/instance: ingress-nginx
      ports:
        - port: 8000
          protocol: TCP
